.role-btn:hover{border-color:#3d5a8a;background:#f0f4ff}
.role-btn.owner-btn{border-color:#b8922a;background:#fdf8ef}
.role-btn.owner-btn:hover{background:#f5eddb}
.pin-wrap{margin-top:1rem;padding-top:1rem;border-top:1px solid #eee}
.pin-wrap label{font-size:11px;color:#6b7896;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.pin-wrap input{width:100%;padding:9px 10px;border:1.5px solid #dde3ee;border-radius:6px;font-size:15px;letter-spacing:6px;font-family:monospace;text-align:center}
.pin-wrap input:focus{outline:none;border-color:#3d5a8a}
.pin-submit{margin-top:8px;width:100%;padding:9px;background:#1a2744;color:white;border:none;border-radius:6px;cursor:pointer;font-family:Georgia,serif;font-size:13px}

.rb-owner{background:#fdf8ef;color:#a06800;border-color:#e8c97a}
.rb-buyer{background:#edf7ed;color:#2d7a2d;border-color:#b2deb2}
.rb-seller{background:#f0f4ff;color:#2a4fa0;border-color:#b0c0e8}

// ─── File Cell — upload a file OR paste a Drive/web link ─────────────────────
function fileIcon(name,mime){
  if(!name&&!mime)return"📎";
  const ext=(name||"").split(".").pop().toLowerCase();
  if(["pdf"].includes(ext)||mime==="application/pdf")return"📄";
  if(["doc","docx"].includes(ext))return"📝";
  if(["xls","xlsx","csv"].includes(ext))return"📊";
  if(["ppt","pptx"].includes(ext))return"📽";
  if(["jpg","jpeg","png","gif","webp","svg"].includes(ext)||(mime||"").startsWith("image/"))return"🖼";
  if(["zip","rar","7z","tar","gz"].includes(ext))return"🗜";
  if(["txt","md"].includes(ext))return"📃";
  if((name||"").includes("drive.google")||(name||"").includes("docs.google"))return"📁";
  return"📎";
}
function fmtBytes(b){if(!b)return"";if(b<1024)return b+"B";if(b<1048576)return(b/1024).toFixed(0)+"KB";return(b/1048576).toFixed(1)+"MB";}

function FileCell({attachment,onSave,canEdit}){
  // attachment = {type:"file",name,mime,size,data} | {type:"link",url,label} | null
  const [mode,setMode]=useState("view"); // view | menu | linkInput | uploading
  const [linkDraft,setLinkDraft]=useState("");
  const [uploadErr,setUploadErr]=useState("");
  const fileRef=useRef(null);
  const linkRef=useRef(null);

  function openMenu(){setMode("menu");setUploadErr("");}
  function cancel(){setMode("view");setLinkDraft("");}
  function remove(){onSave(null);}

  // File upload handler
  function handleFileChange(e){
    const file=e.target.files&&e.target.files[0];
    if(!file){setMode("view");return;}
    if(file.size>4*1024*1024){setUploadErr("File too large — max 4 MB. Use a Drive link for bigger files.");setMode("menu");return;}
    setMode("uploading");
    const reader=new FileReader();
    reader.onload=ev=>{
      onSave({type:"file",name:file.name,mime:file.type||"application/octet-stream",size:file.size,data:ev.target.result});
      setMode("view");
    };
    reader.onerror=()=>{setUploadErr("Read failed — try again.");setMode("menu");};
    reader.readAsDataURL(file);
    e.target.value="";
  }

  // Download stored file
  function download(){
    if(!attachment||attachment.type!=="file")return;
    const a=document.createElement("a");
    a.href=attachment.data;
    a.download=attachment.name;
    a.click();
  }

  // Save link
  function saveLink(){
    const url=linkDraft.trim();
    if(!url){setLinkDraft("");setMode("view");return;}
    let label=url;
    if(url.includes("drive.google.com")||url.includes("docs.google.com")||url.includes("sheets.google.com")||url.includes("slides.google.com")){
      label=url.includes("spreadsheet")?"📊 Google Sheets":url.includes("document")?"📄 Google Docs":url.includes("presentation")?"📽 Google Slides":url.includes("folders")?"📁 Drive Folder":"📎 Google Drive";
    }
    onSave({type:"link",url,label});
    setMode("view");setLinkDraft("");
  }

  // ── VIEW: nothing attached
  if(!attachment) return React.createElement("div",{style:{padding:"4px 2px"}},
    canEdit
      ? React.createElement("div",null,
          mode==="menu"&&React.createElement("div",{style:{background:"white",border:"1.5px solid #3d5a8a",borderRadius:"6px",padding:"8px",marginBottom:"4px",boxShadow:"0 2px 8px rgba(0,0,0,0.12)"}},
            React.createElement("div",{style:{fontSize:"10px",fontWeight:"600",color:"#1a2744",marginBottom:"6px"}},"Attach document"),
            React.createElement("button",{
              onClick:()=>fileRef.current&&fileRef.current.click(),
              style:{width:"100%",padding:"7px 8px",marginBottom:"5px",background:"#f0f4ff",border:"1.5px solid #b0c0e8",borderRadius:"5px",cursor:"pointer",fontSize:"11px",color:"#2a4fa0",fontFamily:"Georgia,serif",textAlign:"left"}},
              "📁  Upload file from device"),
            React.createElement("input",{ref:fileRef,type:"file",style:{display:"none"},accept:".pdf,.doc,.docx,.xls,.xlsx,.csv,.ppt,.pptx,.txt,.md,.jpg,.jpeg,.png,.gif,.zip",onChange:handleFileChange}),
            React.createElement("div",{style:{fontSize:"9px",color:"#6b7896",marginBottom:"5px",textAlign:"center"}},"— or —"),
            mode!=="linkInput"
              ? React.createElement("button",{
                  onClick:()=>{setMode("linkInput");setTimeout(()=>linkRef.current&&linkRef.current.focus(),30);},
                  style:{width:"100%",padding:"7px 8px",background:"#f9f7f2",border:"1.5px solid #e8c97a",borderRadius:"5px",cursor:"pointer",fontSize:"11px",color:"#a06800",fontFamily:"Georgia,serif",textAlign:"left"}},
                  "🔗  Paste Google Drive / web link")
              : React.createElement("div",null,
                  React.createElement("input",{ref:linkRef,
                    style:{width:"100%",fontSize:"11px",border:"1.5px solid #3d5a8a",borderRadius:"4px",padding:"5px 7px",fontFamily:"Georgia,serif",marginBottom:"4px"},
                    value:linkDraft,onChange:e=>setLinkDraft(e.target.value),
                    onKeyDown:e=>{if(e.key==="Enter")saveLink();if(e.key==="Escape")cancel();},
                    placeholder:"https://drive.google.com/…"}),
                  React.createElement("div",{style:{display:"flex",gap:"4px"}},
                    React.createElement("button",{onClick:saveLink,style:{flex:1,fontSize:"10px",background:"#1a2744",color:"white",border:"none",borderRadius:"4px",padding:"4px 0",cursor:"pointer",fontFamily:"Georgia,serif"}},"Save"),
                    React.createElement("button",{onClick:cancel,style:{fontSize:"10px",background:"transparent",color:"#6b7896",border:"1px solid #dde3ee",borderRadius:"4px",padding:"4px 6px",cursor:"pointer",fontFamily:"Georgia,serif"}},"Cancel"),
                  ),
                ),
            uploadErr&&React.createElement("div",{style:{fontSize:"10px",color:"#b02020",marginTop:"5px",lineHeight:"1.4"}},uploadErr),
            React.createElement("button",{onClick:cancel,style:{marginTop:"6px",width:"100%",fontSize:"9px",color:"#6b7896",background:"transparent",border:"none",cursor:"pointer",fontFamily:"Georgia,serif"}},"✕ Cancel"),
          ),
          mode!=="menu"&&mode!=="linkInput"&&React.createElement("button",{onClick:openMenu,
            style:{fontSize:"10px",color:"#3d5a8a",background:"#f0f4ff",border:"1.5px dashed #b0c0e8",borderRadius:"5px",padding:"5px 7px",cursor:"pointer",width:"100%",fontFamily:"Georgia,serif",textAlign:"left",lineHeight:"1.5"}},
            "📎 Attach file\nor Drive link"),
          mode==="uploading"&&React.createElement("div",{style:{fontSize:"10px",color:"#a06800",padding:"4px"}},"⏳ Reading file…"),
        )
      : React.createElement("span",{style:{fontSize:"11px",color:"#ccc"}},"—")
  );

  // ── VIEW: file attached
  const icon=attachment.type==="file"?fileIcon(attachment.name,attachment.mime):"🔗";
  const label=attachment.type==="file"?attachment.name:(attachment.label||attachment.url);
  const sub=attachment.type==="file"?fmtBytes(attachment.size):"";

  return React.createElement("div",{style:{padding:"4px 2px"}},
    React.createElement("div",{style:{background:"#f0f4ff",border:"1px solid #b0c0e8",borderRadius:"5px",padding:"5px 7px"}},
      React.createElement("div",{style:{fontSize:"11px",color:"#1a2744",fontWeight:"600",wordBreak:"break-word",lineHeight:"1.4"}},icon+" "+label),
      sub&&React.createElement("div",{style:{fontSize:"9px",color:"#6b7896",marginTop:"1px"}},sub),
      canEdit&&React.createElement("div",{style:{display:"flex",gap:"4px",marginTop:"5px"}},
        attachment.type==="file"
          ? React.createElement("button",{onClick:download,style:{flex:1,fontSize:"9px",background:"#1a2744",color:"white",border:"none",borderRadius:"3px",padding:"3px 0",cursor:"pointer",fontFamily:"Georgia,serif"}},"⬇ Download")
          : React.createElement("a",{href:attachment.url,target:"_blank",rel:"noopener noreferrer",style:{flex:1,fontSize:"9px",background:"#1a2744",color:"white",border:"none",borderRadius:"3px",padding:"3px 4px",cursor:"pointer",fontFamily:"Georgia,serif",textDecoration:"none",textAlign:"center"}},"↗ Open"),
        React.createElement("button",{onClick:remove,style:{fontSize:"9px",color:"#b02020",background:"#fdecea",border:"1px solid #f0b4b4",borderRadius:"3px",padding:"3px 5px",cursor:"pointer",fontFamily:"Georgia,serif"}},"✕"),
      ),
      !canEdit&&attachment.type==="link"&&React.createElement("a",{href:attachment.url,target:"_blank",rel:"noopener noreferrer",style:{fontSize:"9px",color:"#2a4fa0",display:"block",marginTop:"3px"}},"↗ Open"),
      !canEdit&&attachment.type==="file"&&React.createElement("button",{onClick:download,style:{marginTop:"3px",fontSize:"9px",background:"#f0f4ff",color:"#2a4fa0",border:"1px solid #b0c0e8",borderRadius:"3px",padding:"2px 5px",cursor:"pointer",fontFamily:"Georgia,serif"}},"⬇ Download"),
    ),
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────
function App(){
  const [role,setRole]=useState(null);

  const [saving,setSaving]=useState(false);
  const [lastSaved,setLastSaved]=useState(null);
  const [fSec,setFSec]=useState("all");
  const [fStatus,setFStatus]=useState("all");

  useEffect(()=>{
    try{
      const saved=localStorage.getItem("dd_trojan_v4");
      if(saved){
        // migrate: convert old docName/docLink fields to attachment
        const parsed=JSON.parse(saved);
        const migrated=parsed.map(s=>({...s,items:s.items.map(it=>{
          if(!it.attachment&&(it.docName||it.docLink)){
            const att=it.docLink?{type:"link",url:it.docLink,label:it.docName||it.docLink}:null;
            return{...it,attachment:att};
          }
          return it;
        })}));
        setData(migrated);
      } else {
        // also try old key and migrate
        const old3=localStorage.getItem("dd_trojan_v3");
        if(old3){
          const parsed=JSON.parse(old3);
          const migrated=parsed.map(s=>({...s,items:s.items.map(it=>{
            const att=it.docLink?{type:"link",url:it.docLink,label:it.docName||it.docLink}:null;
            return{...it,attachment:att||it.attachment||null};
          })}));
          setData(migrated);
        } else {
          setData(DATA);
        }
      }
    }catch(e){setData(DATA);}
    setLoading(false);
  },[]);

  function persist(nd){
    setSaving(true);
    try{localStorage.setItem("dd_trojan_v4",JSON.stringify(nd));setLastSaved(new Date());}catch(e){
      // localStorage quota exceeded — probably large file attachments
      console.warn("localStorage quota:",e);
    }
    setSaving(false);
  }

  function upd(si,ii,field,val){
    const nd=data.map((s,a)=>a!==si?s:{...s,items:s.items.map((it,b)=>b!==ii?it:{...it,[field]:val})});
    setData(nd);persist(nd);

    const date=new Date().toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'});
    const nd=data.map((s,a)=>a!==si?s:{...s,items:s.items.map((it,b)=>b!==ii?it:{...it,verifyStatus:vs,verifiedDate:vs==="verified"?date:it.verifiedDate})});
    setData(nd);persist(nd);

    setEditing({si,ii,field,val:val||""});
    setTimeout(()=>inputRef.current&&inputRef.current.focus(),30);
  }

  function commit(){
    if(!editing)return;
    upd(editing.si,editing.ii,editing.field,editing.val);
    setEditing(null);
  }

  function isEditing(si,ii,field){return editing&&editing.si===si&&editing.ii===ii&&editing.field===field;}

  if(!role)return React.createElement(RoleModal,{onSelect:setRole});

  const R=ROLES[role];

    total:allItems.length,
    provided:allItems.filter(i=>i.status==="provided").length,
